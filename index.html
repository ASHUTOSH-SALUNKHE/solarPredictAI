<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- PWA / Mobile UI -->
    <meta name="theme-color" content="#123832" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Performance: Preconnect & DNS-Prefetch -->
    <link rel="preconnect" href="https://api.open-meteo.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.open-meteo.com" />
    <link rel="preconnect" href="https://nominatim.openstreetmap.org" crossorigin />
    <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet">

    <!-- Security (Basic CSP for Vite apps is tricky, relying on HTTP headers mostly) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- Base Title (Dynamic title set via react-helmet-async) -->
    <title>SolarPredict AI | Solar Panel Prediction, House Siting & Cost Calculator</title>
  </head>
  <body>
    <div id="root"></div>

    <script defer>
      // Early fix for Trusted Types
      if (window.trustedTypes && window.trustedTypes.createPolicy) {
        if (!window.trustedTypes.defaultPolicy) {
          window.trustedTypes.createPolicy('default', {
            createHTML: (string) => string,
            createScriptURL: (string) => string,
            createScript: (string) => string,
          });
        }
      }
    </script>
    <!-- Defer main script execution to prevent blocking first paint -->
    <script type="module" src="/src/main.jsx" defer></script>
  </body>
</html>
